[build]
  functions = "netlify/functions"
  publish = "."

[[headers]]
  for = "/index.html"
  [headers.values]
    Content-Type = "text/html; charset=UTF-8"

[[headers]]
  for = "/"
  [headers.values]
    Content-Type = "text/html; charset=UTF-8"

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
